name: sentinell-ai

services:
  db:
    image: postgres:18-alpine
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:?Set DB_NAME}
      POSTGRES_USER: ${DB_USER:?Set DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - backend

  web:
    build:
      context: .
    restart: always
    init: true
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env.production
    environment:
      DB_ENGINE: django.db.backends.postgresql
      DB_HOST: db
      DB_PORT: "5432"
      DJANGO_ENV: production
      DJANGO_DEBUG: "False"
      VALIDATE_DEPLOYMENT: "True"
    ports:
      - "${WEB_BIND_ADDRESS:-127.0.0.1}:${WEB_PORT:-8000}:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz/', timeout=3)",
        ]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 60s
    stop_grace_period: 45s
    networks:
      - backend
      - edge

networks:
  backend:
    internal: true
  edge:

volumes:
  postgres_data:
